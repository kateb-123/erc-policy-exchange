<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERC Policy Exchange</title>
  <meta
    name="description"
    content="Education Research Center — Policy Exchange: a filterable, spreadsheet-driven feed of education opportunities, new policy research, headlines, and upcoming events."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Work+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header__inner">
      <p class="site-header__eyebrow">Education Research Center</p>
      <h1 class="site-header__title">Policy Exchange</h1>
      <p class="site-header__subtitle">Research, News, &amp; Opportunities</p>
      <div class="news-tabs" id="news-tabs" role="tablist" aria-label="Categories"></div>
    </div>
  </header>

  <main id="main">
    <div class="layout">
      <!-- Left rail: refine within the active category -->
      <aside class="rail" aria-label="Refine the feed">
        <div class="rail__group">
          <h2 class="rail__label" id="search-label">Search</h2>
          <div class="search-wrap">
            <input
              type="search"
              class="search-input"
              id="news-search"
              placeholder="Search headlines &amp; blurbs…"
              aria-labelledby="search-label"
              autocomplete="off"
            />
          </div>
        </div>
        <div class="rail__group">
          <label class="rail__label" for="news-subtype">Sub-category</label>
          <select class="rail-select" id="news-subtype"></select>
        </div>
        <button class="rail__reset" id="news-reset" type="button">Clear filters</button>
      </aside>

      <!-- Results: the feed, with the count summary underneath -->
      <div class="results">
        <div class="news-list" id="news-list"></div>
        <div class="results__meta">
          <p class="results__count" id="news-count" aria-live="polite" role="status"></p>
          <p class="results__updated" id="news-updated"></p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>
      Education Research Center, Texas A&amp;M University. Content is CSV-driven —
      edit <code>data/news.csv</code> to update this feed.
    </p>
  </footer>

  <script src="js/csv.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
