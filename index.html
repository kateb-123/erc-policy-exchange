<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERC Policy Exchange</title>
  <meta
    name="description"
    content="Education Research Center — Policy Exchange: a filterable, spreadsheet-driven feed of education opportunities, new policy research, headlines, and upcoming events."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Work+Sans:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <!-- ?v= busts stale browser/Pages caches — bump when shipping big changes. -->
  <link rel="stylesheet" href="css/styles.css?v=39" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- Masthead: just the title (doubles as a Home link). The logo + contact
       links live in the footer now. -->
  <header class="site-header">
    <div class="site-header__inner">
      <h1 class="site-header__title">
        <a href="?" aria-label="ERC Policy Exchange — home">ERC Policy Exchange</a>
      </h1>
    </div>
  </header>

  <!-- Top strip: on the landing it holds just the global search; inside a
       section it also carries Home + the section links (built by app.js). -->
  <nav class="topnav" aria-label="Sections">
    <div class="topnav__in">
      <button type="button" class="topnav__menu-btn" id="menu-btn" aria-expanded="false" aria-controls="topnav">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        Menu
      </button>
      <div id="topnav" class="topnav__links"></div>
      <div class="topnav__search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input
          type="search"
          id="global-search"
          placeholder="Search everything…"
          aria-label="Search all sections"
          autocomplete="off"
        />
      </div>
    </div>
  </nav>

  <main id="main">
    <!-- Landing page (home view): intro + section cards. -->
    <section class="landing" id="landing" aria-label="Welcome" hidden>
      <div class="intro">
        <h2 class="intro__title">Howdy! Welcome to the ERC Policy Exchange.</h2>
        <p class="intro__text">
          Browse through the latest research, upcoming events, opportunities,
          and education headlines. Curated by the
          <a href="https://erc.cehd.tamu.edu/" target="_blank" rel="noopener"><strong>Texas A&amp;M Education Research Center</strong></a>.
        </p>
      </div>
      <div class="cards cards--4" id="landing-cards"></div>
    </section>

    <!-- Section view: title + blurb, filter toolbar, feed, then the count. -->
    <div class="results" id="section" hidden>
      <div class="section-head" id="section-head" hidden></div>
      <div class="opp-toolbar" id="opp-toolbar" hidden></div>
      <div class="news-list" id="news-list"></div>
      <div class="results__meta">
        <p class="results__count" id="news-count" aria-live="polite" role="status"></p>
        <p class="results__updated" id="news-updated"></p>
      </div>
    </div>
  </main>

  <!-- Footer: the contact home (logo + website + email) on every screen size;
       the mobile masthead stays clean because these live here. -->
  <footer class="site-footer">
    <div class="site-footer__inner">
      <img
        class="site-footer__logo"
        src="assets/ERC_Horizontal_WhiteText_narrow.png"
        alt="Education Research Center, Texas A&amp;M University"
      />
      <div class="site-footer__links">
        <a class="site-footer__link" href="https://erc.cehd.tamu.edu/" target="_blank" rel="noopener">
          <svg class="site-footer__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
            <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm4.5 5.5-2.4 6.6-6.6 2.4 2.4-6.6 6.6-2.4zM12 10.7a1.3 1.3 0 1 0 0 2.6 1.3 1.3 0 0 0 0-2.6z" />
          </svg>
          <span>erc.cehd.tamu.edu</span>
        </a>
        <a class="site-footer__link" href="mailto:erc@tamu.edu">
          <svg class="site-footer__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
            <path d="M2 6.5A2.5 2.5 0 0 1 4.5 4h15A2.5 2.5 0 0 1 22 6.5v.3l-10 5.7L2 6.8v-.3z" />
            <path d="M22 8.9V17.5A2.5 2.5 0 0 1 19.5 20h-15A2.5 2.5 0 0 1 2 17.5V8.9l9.5 5.4a1 1 0 0 0 1 0L22 8.9z" />
          </svg>
          <span>erc@tamu.edu</span>
        </a>
      </div>
    </div>
  </footer>

  <script src="js/csv.js?v=2"></script>
  <script src="js/app.js?v=40"></script>
</body>
</html>
