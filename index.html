<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERC Policy Exchange</title>
  <meta
    name="description"
    content="Education Research Center — Policy Exchange: a filterable, spreadsheet-driven feed of education opportunities, new policy research, headlines, and upcoming events."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Work+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header__inner">
      <div class="site-header__intro">
        <h1 class="site-header__title">ERC Policy Exchange</h1>
        <p class="site-header__subtitle">
          Engage with the latest research, upcoming events, and professional
          opportunities shaping the field of education policy.
        </p>
      </div>
      <div class="site-header__brand">
        <img
          class="site-header__logo"
          src="assets/ERC_Horizontal_WhiteText_narrow.png"
          alt="Education Research Center, Texas A&amp;M University"
        />
        <div class="site-header__contact">
          <a class="site-header__contact-link" href="https://erc.cehd.tamu.edu/" target="_blank" rel="noopener">
            <svg class="site-header__contact-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
              <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm4.5 5.5-2.4 6.6-6.6 2.4 2.4-6.6 6.6-2.4zM12 10.7a1.3 1.3 0 1 0 0 2.6 1.3 1.3 0 0 0 0-2.6z" />
            </svg>
            <span>erc.cehd.tamu.edu</span>
          </a>
          <span class="site-header__contact-sep" aria-hidden="true">|</span>
          <a class="site-header__contact-link" href="mailto:erc@tamu.edu">
            <svg class="site-header__contact-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
              <path d="M2 6.5A2.5 2.5 0 0 1 4.5 4h15A2.5 2.5 0 0 1 22 6.5v.3l-10 5.7L2 6.8v-.3z" />
              <path d="M22 8.9V17.5A2.5 2.5 0 0 1 19.5 20h-15A2.5 2.5 0 0 1 2 17.5V8.9l9.5 5.4a1 1 0 0 0 1 0L22 8.9z" />
            </svg>
            <span>erc@tamu.edu</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main id="main">
    <div class="layout">
      <!-- Left sidebar: category navigation -->
      <aside class="sidenav" aria-label="Categories">
        <nav class="news-tabs" id="news-tabs" role="tablist" aria-label="Categories"></nav>
      </aside>

      <!-- Results: filter toolbar, feed, then the count summary -->
      <div class="results">
        <div class="filter-bar" role="search">
          <div class="search-wrap">
            <input
              type="search"
              class="search-input"
              id="news-search"
              placeholder="Search headlines &amp; blurbs…"
              aria-label="Search headlines and blurbs"
              autocomplete="off"
            />
          </div>
          <select class="rail-select" id="news-subtype" aria-label="Sub-category"></select>
          <button class="rail__reset" id="news-reset" type="button">Clear filters</button>
        </div>
        <div class="news-list" id="news-list"></div>
        <div class="results__meta">
          <p class="results__count" id="news-count" aria-live="polite" role="status"></p>
          <p class="results__updated" id="news-updated"></p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/csv.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
